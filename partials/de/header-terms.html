<header id="header" class="header d-flex align-items-center sticky-top">
    <div
         class="header-container container-fluid container-xl position-relative align-items-center justify-content-between">
        <a href="/de/" class="logo d-flex align-items-center me-auto me-xl-0">
            <img src="/assets/img/logo.webp" width="802" height="194" alt="fovebo logo">
            <!-- <h1 class="sitename">fovebo</h1> -->
        </a>
        <nav id="navmenu" class="navmenu" hx-on:click="
                if (event.target.closest('a')) {
                    document.body.classList.remove('mobile-nav-active');
                    const t = document.querySelector('.mobile-nav-toggle');
                    if (t) { t.classList.add('bi-list'); t.classList.remove('bi-x'); }
                }">
            <ul>
                <li><a href="/de/#hero" data-umami-event="nav_home_click">Home</a></li>
                <li><a href="/de/#services" data-umami-event="nav_services_click">Services</a></li>
                <li><a href="/de/working-with-fovebo/" data-umami-event="nav_how_we_work_click">How we work</a></li>
                <li><a href="/de/#team" data-umami-event="nav_team_click">Team</a></li>
                <li><a href="/de/#faq" data-umami-event="nav_faq_click">FAQ</a></li>
                <li class="cta-buttons" data-aos="fade-up" data-aos-delay="300">
                    <a href="/de/#contact" class="btn btn-primary" data-umami-event="nav_contact_click">Contact</a>
                </li>
                <li class="nav-language-switch" aria-label="Language">
                    <a href="/en/terms/" lang="en">EN</a>
                    <span class="language-separator" aria-hidden="true">·</span>
                    <span lang="de" aria-current="true">DE</span>
                </li>
            </ul>
            <i class="mobile-nav-toggle d-xl-none bi bi-list" hx-on:click="
                        document.body.classList.toggle('mobile-nav-active');
                        this.classList.toggle('bi-list');
                        this.classList.toggle('bi-x');"></i>
        </nav>
    </div>
</header>
